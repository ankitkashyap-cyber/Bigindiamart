<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - BIG INDIA MART</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 40%, #1a3a6e 0%, #0d1b3e 40%, #060d1f 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    /* LOGO */
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 1.7rem; font-weight: 900; color: white; letter-spacing: 0.02em; }
    .logo h1 .india { color: #4d9fff; }
    .logo .badge {
      display: inline-block; margin-top: 8px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171; font-size: 0.72rem; font-weight: 700;
      padding: 3px 12px; border-radius: 20px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* ALERT */
    .alert { padding:11px 14px; border-radius:10px; font-size:0.83rem; margin-bottom:16px; }
    .alert-err { background:rgba(239,68,68,0.15); color:#fca5a5; border:1px solid rgba(239,68,68,0.25); }
    .alert-ok  { background:rgba(34,197,94,0.15);  color:#86efac; border:1px solid rgba(34,197,94,0.25); }

    /* FORM */
    .fg { margin-bottom: 14px; }
    .fg label { display:block; font-size:0.78rem; color:rgba(255,255,255,0.5); margin-bottom:6px; }
    .fg input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 13px 16px;
      color: white; font-size: 0.93rem;
      outline: none; transition: all 0.2s;
    }
    .fg input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    }
    .fg input::placeholder { color: rgba(255,255,255,0.25); }

    /* BUTTON */
    .btn-login {
      width: 100%; padding: 14px;
      background: #2563eb;
      border: none; border-radius: 12px;
      color: white; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(37,99,235,0.35);
      margin-top: 4px;
    }
    .btn-login:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,0.45); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .hint {
      background: rgba(0,0,0,0.2); border-radius: 10px;
      padding: 10px 14px; font-size: 0.78rem;
      color: rgba(255,255,255,0.3); text-align: center; margin-top: 14px;
    }

    .back { text-align:center; margin-top:18px; font-size:0.82rem; }
    .back a { color:rgba(255,255,255,0.3); text-decoration:none; }
    .back a:hover { color:rgba(255,255,255,0.6); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>BIG <span class="india">INDIA</span> MART</h1>
    <div class="badge">🔐 Admin Panel</div>
  </div>

  <div id="alert-box"></div>

  <div class="fg">
    <label>Admin Email</label>
    <input type="email" id="a-email" placeholder="Enter admin email"
      onkeydown="if(event.key==='Enter') doLogin()"/>
  </div>
  <div class="fg">
    <label>Password</label>
    <input type="password" id="a-pass" placeholder="Enter password"
      onkeydown="if(event.key==='Enter') doLogin()"/>
  </div>

  <button class="btn-login" id="login-btn" onclick="doLogin()">Login →</button>

  <div class="hint">📧 admin@bigindiamart.com &nbsp;·&nbsp; 🔑 admin123</div>
  <div class="back"><a href="index.html">← Back to Home</a></div>
</div>

<script>
  const cur = JSON.parse(localStorage.getItem('bim_current_user') || 'null');
  if (cur && cur.role === 'admin') window.location.href = 'admin.html';

  function showAlert(msg, type='err') {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }

  function doLogin() {
    const email = document.getElementById('a-email').value.trim();
    const pass  = document.getElementById('a-pass').value;
    if (!email || !pass) return showAlert('Please enter email and password');

    const btn = document.getElementById('login-btn');
    btn.textContent = 'Logging in...'; btn.disabled = true;

    setTimeout(() => {
      if (email === 'admin@bigindiamart.com' && pass === 'admin123') {
        localStorage.setItem('bim_current_user', JSON.stringify({ name:'Admin', role:'admin', email }));
        showAlert('✅ Login successful! Redirecting...', 'ok');
        setTimeout(() => window.location.href = 'admin.html', 900);
      } else {
        showAlert('❌ Invalid admin credentials');
        btn.textContent = 'Login →'; btn.disabled = false;
      }
    }, 600);
  }
</script>

</body>
</html>
